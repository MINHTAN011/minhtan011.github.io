<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form 2</title>
  </head>
  <body>
    <h1>Đơn Gia Nhập Hội Fan Cuồng Đội Tuyển Bóng đá Việt Nam</h1>
    <p>
      Chào Mừng bạn đến với hội của những trái tim đỏ rực, cháy hết mình vì màu
      cờ sắc áo!!!!!
        <form action="">
        <label for="fullname">Họ Tên:</label>
            <input type="text" id="fullname"
                name="fullname" required placeholder="VD:Nguyễn Văn Toàn" size="30" >
        <br><br>
            <label for="age">Tuổi:</label>
            <input type="number" id="age" name="age"    required placeholder="VD:20" size="20">
        <br><br>
        <!--story-->
        <label for="story">Mô tả cảm xúc khi đội tuyển Việt Nam Ghi Bàn</label>
        <br>
        <textarea name="story" id="story " placeholder="GÕ Cảm Nghĩ" rows="5" cols="50" spellcheck></textarea>
        
        <br><br>
            <!--Giới tính-->
            <fieldset>
                <legend>Giới tính của bạn:</legend>
                <label for="male">
                    <input type="radio" name="gender" id="male" value="male">Nam
                </label>
                <label for="female">
                    <input type="radio" name="gender" id="female" value="female">Nữ
                </label>             
            </fieldset>
  <br><br>
              <!-- Vị trí yêu thích -->
               <label for="position">Bạn thích chơi vị trí nào</label>
               <select name="position" id="position">
                <option value="Tiền đạo">Tiền Đạo</option>
                <option value="Tiền Vệ">Tiền Vệ</option>
                <option value="Hậu Vệ">Hậu Vệ</option>
                <option value="Thủ Môn">Thủ Môn</option>
               </select>
               <br><br>
               <label for="fan">Mức Độ Yêu Thích Của Bạn</label> <input type="number" name="fan" id="fan" required placeholder="10" size="1">
        
        
        </form>
    </p>
  </body>
</html>
